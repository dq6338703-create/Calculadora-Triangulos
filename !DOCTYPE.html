<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Triángulos</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
    text-align: center;
}

/* Título principal */
.titulo-app {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #333;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 80%;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 10px;
    margin: 10px 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.calcular {
    background: #007bff;
    color: white;
}

.limpiar {
    background: #dc3545;
    color: white;
}

.resultado {
    margin-top: 15px;
    text-align: left;
}
</style>

</head>

<body>

<!-- 🔥 AQUÍ ESTÁ EL TÍTULO QUE TE PIDIERON -->
<div class="titulo-app">
Aplicación de Diego Jesus Garcia Quiroz
</div>

<div class="container">
<h2>Calculadora de Triángulos</h2>

<input type="number" id="a" placeholder="Lado A">
<input type="number" id="b" placeholder="Lado B">
<input type="number" id="c" placeholder="Lado C">

<input type="number" id="A" placeholder="Ángulo A (°)">
<input type="number" id="B" placeholder="Ángulo B (°)">
<input type="number" id="C" placeholder="Ángulo C (°)">

<br>

<button class="calcular" onclick="calcular()">Calcular</button>
<button class="limpiar" onclick="limpiar()">Limpiar</button>

<div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

    let A = parseFloat(document.getElementById("A").value);
    let B = parseFloat(document.getElementById("B").value);
    let C = parseFloat(document.getElementById("C").value);

    let res = "";

    // Validación: al menos 3 datos
    let datos = [a,b,c,A,B,C].filter(x => !isNaN(x));
    if (datos.length < 3) {
        document.getElementById("resultado").innerHTML = "❌ Ingresa al menos 3 datos.";
        return;
    }

    // Calcular ángulos si hay 2
    if (!isNaN(A) && !isNaN(B) && isNaN(C)) {
        C = 180 - (A + B);
    }
    if (!isNaN(A) && !isNaN(C) && isNaN(B)) {
        B = 180 - (A + C);
    }
    if (!isNaN(B) && !isNaN(C) && isNaN(A)) {
        A = 180 - (B + C);
    }

    // Validar suma de ángulos
    if (!isNaN(A) && !isNaN(B) && !isNaN(C)) {
        if (Math.round(A + B + C) !== 180) {
            res += "❌ Los ángulos no suman 180°<br>";
        }
    }

    // Funciones auxiliares
    function rad(x) { return x * Math.PI / 180; }
    function deg(x) { return x * 180 / Math.PI; }

    // Ley de cosenos
    if (!isNaN(a) && !isNaN(b) && !isNaN(C) && isNaN(c)) {
        c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(rad(C)));
    }

    if (!isNaN(a) && !isNaN(c) && !isNaN(B) && isNaN(b)) {
        b = Math.sqrt(a*a + c*c - 2*a*c*Math.cos(rad(B)));
    }

    if (!isNaN(b) && !isNaN(c) && !isNaN(A) && isNaN(a)) {
        a = Math.sqrt(b*b + c*c - 2*b*c*Math.cos(rad(A)));
    }

    // Calcular ángulos con lados
    if (!isNaN(a) && !isNaN(b) && !isNaN(c)) {
        A = deg(Math.acos((b*b + c*c - a*a)/(2*b*c)));
        B = deg(Math.acos((a*a + c*c - b*b)/(2*a*c)));
        C = 180 - A - B;
    }

    // Validar triángulo
    if (!isNaN(a) && !isNaN(b) && !isNaN(c)) {
        if (a + b <= c || a + c <= b || b + c <= a) {
            res += "❌ No es un triángulo válido<br>";
        }
    }

    // Mostrar resultados
    res += "<br><strong>Resultados:</strong><br>";
    if (!isNaN(a)) res += "Lado A: " + a.toFixed(2) + "<br>";
    if (!isNaN(b)) res += "Lado B: " + b.toFixed(2) + "<br>";
    if (!isNaN(c)) res += "Lado C: " + c.toFixed(2) + "<br>";
    if (!isNaN(A)) res += "Ángulo A: " + A.toFixed(2) + "°<br>";
    if (!isNaN(B)) res += "Ángulo B: " + B.toFixed(2) + "°<br>";
    if (!isNaN(C)) res += "Ángulo C: " + C.toFixed(2) + "°<br>";

    document.getElementById("resultado").innerHTML = res;
}

function limpiar() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("resultado").innerHTML = "";
}
</script>

</body>
</html>
